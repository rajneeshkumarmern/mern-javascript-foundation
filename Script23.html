<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JS: For Loop (Modern)</title>
  <style>
    div {
      margin: 20px;
      font-size: 18px;
      font-family: Arial, sans-serif;
    }
  </style>
</head>
<body>

<div id="mydiv"></div>

<script>
  const mydiv = document.getElementById("mydiv");

  const myprint = (data) => {
    mydiv.innerHTML += `${data}<br/>`;
  };

  myprint("<u>For Loop</u>");

  // Print numbers 1 to 5
  for (let i = 1; i <= 5; i++) {
    myprint(i);
  }

  myprint("-------------");

  // Print even numbers from 1 to 5
  for (let i = 1; i <= 5; i++) {
    if (i % 2 === 0) {
      myprint(i);
    }
  }

  myprint("Done");
</script>

</body>
</html>
