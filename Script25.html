<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JS: break & continue (Modern)</title>
  <style>
    div {
      margin: 20px;
      font-size: 18px;
      font-family: Arial, sans-serif;
    }
  </style>
</head>
<body>

<div id="mydiv"></div>

<script>
  const mydiv = document.getElementById("mydiv");

  const myprint = (data) => {
    mydiv.innerHTML += `${data}<br/>`;
  };

  myprint("<u>Break and Continue</u>");

  // break example
  for (let i = 1; i <= 5; i++) {
    myprint(i);

    if (i >=3) {
      break;
    }

    myprint("Inside Loop");
  }

  myprint("-----------------");

  // continue example
  for (let i = 1; i <= 5; i++) {
    myprint(i);

    if (i >= 3) {
      continue;
    }

    myprint("Inside Loop");
  }

  myprint("Done");
</script>

</body>
</html>
