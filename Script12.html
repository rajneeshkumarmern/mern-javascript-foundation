<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JS: Relational Operators (Modern)</title>
<style>
  div {
    margin: 20px;
    font-size: 18px;
    font-family: Arial, sans-serif;
  }
</style>
</head>
<body>

<div id="mydiv"></div>

<script>
  const mydiv = document.getElementById("mydiv");

  const myprint = (data) => {
    mydiv.innerHTML += `${data}<br/>`;
  };

  myprint("<u>3) Relational Operators</u> :");

  const a = 10;

  myprint(`a => ${a}`);
  myprint(`a > 5 => ${a > 5}`);
  myprint(`a > 10 => ${a > 10}`);
  myprint(`a >= 10 => ${a >= 10}`);
  myprint(`a < 20 => ${a < 20}`);
  myprint(`a < 10 => ${a < 10}`);
  myprint(`a <= 10 => ${a <= 10}`);

  // Equality
  myprint(`a == 10 => ${a == 10}`);
  myprint(`a == '10' => ${a == "10"}`);
  myprint(`a == 10.0 => ${a == 10.0}`);

  // Strict Equality
  myprint(`a === 10 => ${a === 10}`);
  myprint(`a === '10' => ${a === "10"}`);
  myprint(`a === 10.0 => ${a === 10.0}`);

  // Not Equal
  myprint(`a != 10 => ${a != 10}`);
  myprint(`a != '10' => ${a != "10"}`);
  myprint(`a != 10.0 => ${a != 10.0}`);

  // Strict Not Equal
  myprint(`a !== 10 => ${a !== 10}`);
  myprint(`a !== '10' => ${a !== "10"}`);
  myprint(`a !== 10.0 => ${a !== 10.0}`);
</script>

</body>
</html>
